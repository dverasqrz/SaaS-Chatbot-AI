apiVersion: 1

providers:
  - name: 'SaaS Chatbot Dashboards'
    orgId: 1
    folder: 'SaaS Chatbot AI'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
  - name: 'Custom Monitoring Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: true
    editable: false
    options:
      path: /etc/grafana/provisioning/provisioned-dashboards