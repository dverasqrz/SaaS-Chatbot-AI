version: "3.9"

services:
  nginx:
    image: nginx:1.28.3-alpine3.23
    container_name: saas_nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: saas_web_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-groq}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: saas_api_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_NAME: SaaS Chatbot AI API
      APP_ENV: production
      APP_DEBUG: "false"
      # Hostname "db" é o nome do serviço na rede Docker (não use localhost aqui).
      # Evite ${DATABASE_URL} vindo do .env do host — isso costuma apontar para localhost e falha no container.
      # Se a senha tiver @ ou :, codifique-a na URL ou use apenas caracteres seguros.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas_chat}:${POSTGRES_PASSWORD:-saas_chat}@db:5432/${POSTGRES_DB:-saas_chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16.13
    container_name: saas_db_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_chat}
      POSTGRES_USER: ${POSTGRES_USER:-saas_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_chat} -d ${POSTGRES_DB:-saas_chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4.8-alpine3.21
    container_name: saas_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  redis_data: