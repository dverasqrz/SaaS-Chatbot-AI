version: "3.9"

services:
  nginx:
    image: nginx:1.28.3-alpine3.23
    container_name: saas_nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: saas_web_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-groq}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: saas_api_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_NAME: SaaS Chatbot AI API
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-saas_chat}:${POSTGRES_PASSWORD:-saas_chat}@db:5432/${POSTGRES_DB:-saas_chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16.13
    container_name: saas_db_prod
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_chat}
      POSTGRES_USER: ${POSTGRES_USER:-saas_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_chat} -d ${POSTGRES_DB:-saas_chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4.8-alpine3.21
    container_name: saas_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Prometheus - Coleta de métricas
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: saas_prometheus_prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - api
      - postgres-exporter
      - redis-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node Exporter para métricas do host
  node_exporter:
    image: prom/node-exporter:latest
    container_name: saas_node_exporter_prod
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - saas-network

  # cAdvisor para métricas de contêineres
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: saas_cadvisor_prod
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - saas-network
    privileged: true
    depends_on:
      - api
      - web
      - db
      - redis
      - loki
      - prometheus
      - grafana
      - nginx
      - promtail
      - postgres-exporter
      - redis-exporter
      - node_exporter

  # Grafana - Visualização de métricas e logs
  grafana:
    image: grafana/grafana:11.3.0
    container_name: saas_grafana_prod
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Alertas
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/provisioned-dashboards:/etc/grafana/provisioning/provisioned-dashboards:ro
      - ./infra/grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki - Agregação de logs
  loki:
    image: grafana/loki:3.2.0
    container_name: saas_loki_prod
    user: root
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    ports:
      - "3100:3100"
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Exporter - Métricas do banco de dados
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: saas_postgres_exporter_prod
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-saas_chat}:${POSTGRES_PASSWORD:-saas_chat}@db:5432/${POSTGRES_DB:-saas_chat}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Exporter - Métricas do Redis
  redis-exporter:
    image: oliver006/redis_exporter:v1.65.0
    container_name: saas_redis_exporter_prod
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy

  # Promtail - Coletor de logs para o Loki
  promtail:
    image: grafana/promtail:3.2.0
    container_name: saas_promtail_prod
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  saas-network:
    driver: bridge
